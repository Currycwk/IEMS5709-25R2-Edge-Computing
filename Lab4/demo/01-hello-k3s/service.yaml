apiVersion: v1
kind: Service
metadata:
  name: hello-k3s
spec:
  type: NodePort
  selector:
    app: hello-k3s
  ports:
  - port: 5000        # ClusterIP port (used for in-cluster access)
    targetPort: 5000  # Port the container listens on
    nodePort: 30500   # External port on the node (30000-32767)
