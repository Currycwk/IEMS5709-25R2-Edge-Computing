apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-k3s
  labels:
    app: hello-k3s
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-k3s
  template:
    metadata:
      labels:
        app: hello-k3s
    spec:
      containers:
      - name: hello
        image: python:3.12-slim
        command: ["python", "/app/app.py"]
        ports:
        - containerPort: 5000
        volumeMounts:
        - name: app-code
          mountPath: /app
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 3
          periodSeconds: 5
      volumes:
      - name: app-code
        configMap:
          name: hello-k3s-app
