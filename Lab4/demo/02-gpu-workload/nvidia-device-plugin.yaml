# NVIDIA Kubernetes Device Plugin — adapted for K3s
#
# On standard K8s the kubelet socket is at /var/lib/kubelet/device-plugins.
# K3s stores it at /var/lib/rancher/k3s/agent/kubelet/device-plugins.
# The hostPath below maps that K3s-specific path into the container.
#
# Apply after K3s is running:
#   kubectl apply -f nvidia-device-plugin.yaml
#   kubectl -n kube-system rollout status daemonset/nvidia-device-plugin-daemonset

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin-daemonset
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: nvidia-device-plugin-ds
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        name: nvidia-device-plugin-ds
    spec:
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      priorityClassName: system-node-critical
      containers:
      - image: nvcr.io/nvidia/k8s-device-plugin:v0.16.2
        name: nvidia-device-plugin-ctr
        args:
        - --fail-on-init-error=false
        env:
        - name: PASS_DEVICE_SPECS
          value: "true"
        - name: FAIL_ON_INIT_ERROR
          value: "false"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        volumeMounts:
        - name: device-plugin
          mountPath: /var/lib/kubelet/device-plugins
      volumes:
      - name: device-plugin
        hostPath:
          path: /var/lib/rancher/k3s/agent/kubelet/device-plugins
