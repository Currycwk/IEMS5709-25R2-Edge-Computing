version: '3.9'

services:
  vllm:
    profiles: ["local-llm"]
    image: ghcr.io/nvidia-ai-iot/vllm:latest-jetson-orin
    shm_size: "8g"
    ulimits:
      memlock: -1
      stack: 67108864
    runtime: nvidia
    volumes:
      - /opt/models/Qwen3-4B-quantized.w4a16:/root/.cache/huggingface/Qwen3-4B-quantized.w4a16
    command: >
      vllm serve /root/.cache/huggingface/Qwen3-4B-quantized.w4a16
        --host 0.0.0.0
        --port 8000
        --gpu-memory-utilization 0.40
        --max-model-len 4096
        --max-num-batched-tokens 2048

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ./.env
    environment:
      - LLM_MODE=${LLM_MODE:-api}
      - QWEN_BASE_URL=${QWEN_BASE_URL}
      - QWEN_MODEL=${QWEN_MODEL}
      - QWEN_API_KEY=${QWEN_API_KEY}
      - QWEN_HEALTH_PATH=${QWEN_HEALTH_PATH:-/models}
      - VECTOR_DB_DIR=/app/vector_db
      - DATA_DIR=/app/data/raw
      - TOP_K=${TOP_K:-3}
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8001
    volumes:
      - ./data:/app/data
      - ./vector_db:/app/vector_db

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-9898}:9898"
    depends_on:
      - backend

